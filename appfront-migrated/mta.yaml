_schema-version: 3.3.0
ID: MyHANAApp
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: MyHANAApp-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      readiness-health-check-type: http
      readiness-health-check-http-endpoint: /health
    build-parameters:
      builder: npm
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: MyHANAApp-auth
      - name: MyHANAApp-db

  - name: MyHANAApp-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: MyHANAApp-db

  - name: comsapmyhanaapp-ui
    type: html5
    path: app/interaction_items
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms: []

  - name: comsapmyhanaapp-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: MyHANAApp-auth
      - name: srv-api
      - name: comsapmyhanaapp-app-front
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - comsapmyhanaapp-ui.zip
          name: comsapmyhanaapp-ui
          target-path: resources/
    parameters:
      config:
        destinations:
          - name: srv-api
            url: ~{srv-api/srv-url}
            forwardAuthToken: true

resources:
  - name: comsapmyhanaapp-app-front
    type: org.cloudfoundry.managed-service
    parameters:
      service: app-front
      service-name: comsapmyhanaapp-app-front-service
      service-plan: developer

  - name: MyHANAApp-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: MyHANAApp-${org}-${space}
        tenant-mode: dedicated

  - name: MyHANAApp-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared